<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />

  <!-- Favicon y manifest dinámicos por dominio -->
  <script>
    (function () {
      const hostname = window.location.hostname.toLowerCase();

      const ONO_PROP_HOSTS = new Set([
        "onoprop.com",
        "www.onoprop.com",
        "inmobiliaria-bcc63.web.app",
        "inmobiliaria-bcc63.firebaseapp.com",
        "localhost",
        "127.0.0.1",
      ]);

      const isOnoPropDomain = ONO_PROP_HOSTS.has(hostname);

      const faviconHref = isOnoPropDomain
        ? "/FaviconONOProp2.ico?v=onoprop-3"
        : "/favicon.ico?v=ladoctaprop-3";

      const appleTouchIconHref = isOnoPropDomain
        ? "/FaviconONOProp2.ico?v=onoprop-3"
        : "/apple-touch-icon.png?v=ladoctaprop-3";

      const manifestHref = isOnoPropDomain
        ? "/site-onoprop.webmanifest?v=onoprop-3"
        : "/site-ladoctaprop.webmanifest?v=ladoctaprop-3";

      const upsertLink = ({ rel, href, type, sizes }) => {
        let link = document.querySelector(`link[rel="${rel}"]`);

        if (!link) {
          link = document.createElement("link");
          link.rel = rel;
          document.head.appendChild(link);
        }

        link.href = href;

        if (type) {
          link.type = type;
        }

        if (sizes) {
          link.setAttribute("sizes", sizes);
        }
      };

      upsertLink({
        rel: "icon",
        href: faviconHref,
        type: "image/x-icon",
        sizes: "any",
      });

      upsertLink({
        rel: "shortcut icon",
        href: faviconHref,
        type: "image/x-icon",
        sizes: "any",
      });

      upsertLink({
        rel: "apple-touch-icon",
        href: appleTouchIconHref,
        sizes: "180x180",
      });

      upsertLink({
        rel: "manifest",
        href: manifestHref,
      });
    })();
  </script>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ONO Prop</title>
</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
